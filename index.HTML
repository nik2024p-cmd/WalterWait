<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Карточка соцсетей | Белуга</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0c12;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Poppins', sans-serif;
            padding: 20px;
            position: relative;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.4);
        }

        .card {
            position: relative;
            z-index: 10;
            max-width: 460px;
            width: 100%;
            background: rgba(80, 80, 90, 0.35);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 24px 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .avatar-section {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .social-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 28px;
            padding: 16px 10px;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: block;
        }

        .social-card:hover {
            background: rgba(50, 55, 70, 0.7);
            transform: translateY(-3px);
        }

        .social-icon-img {
            width: 42px;
            height: 42px;
            object-fit: contain;
            margin-bottom: 8px;
            display: inline-block;
        }

        .social-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            margin-bottom: 4px;
        }

        .social-username {
            font-size: 0.7rem;
            color: #aac8ff;
            word-break: break-all;
        }

        .social-link-text {
            font-size: 0.6rem;
            color: #ccc;
            margin-top: 6px;
            word-break: break-all;
        }

        @media (max-width: 450px) {
            .card { padding: 20px 16px 30px; }
            .avatar { width: 100px; height: 100px; }
            .social-icon-img { width: 36px; height: 36px; }
        }
    </style>
</head>
<body>

<img class="bg-image" src="https://imgfy.ru/ib/U6QDDb3FlGgmzEH_1775209468.webp" alt="bg">

<div class="card">
    <div class="avatar-section">
        <img class="avatar" src="https://imgfy.ru/ib/AHtIODoXnDY9uJt_1775209407.webp" alt="avatar">
    </div>

    <div class="social-grid">

            <div class="social-name">Telegram</div>
            <div class="social-username">@Beluga_KpyToi</div>
            <div class="social-link-text">t.me/Beluga_KpyToi</div>
